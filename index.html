<!DOCTYPE html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Rougeux Family — Sweden &amp; Norway 2026</title>

<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<!-- Open Graph tags -- so a link to this app shared via iMessage/text
     shows the same split Sweden/Norway flag icon as the home-screen
     icon (icons/icon-192.png above), rather than some inconsistent
     fallback. og:image needs a full, absolute URL (relative paths
     aren't reliably resolved by every messaging app's link-preview
     crawler), so this is hardcoded to the deployed GitHub Pages URL --
     if this app is ever redeployed to a different domain, this needs
     updating to match. icons/icon-512.png (not icon-192.png) is used
     here since it's the same icon design at higher resolution, which
     preview crawlers generally prefer over a smaller source image. -->
<meta property="og:type" content="website" />
<meta property="og:url" content="https://jrougeux.github.io/rougeux-scandinavia-2026/" />
<meta property="og:title" content="Rougeux Family — Sweden &amp; Norway 2026" />
<meta property="og:description" content="Family trip itinerary and logistics, Jul 22 – Aug 6 2026" />
<meta property="og:image" content="https://jrougeux.github.io/rougeux-scandinavia-2026/icons/icon-512.png" />
<meta property="og:image:width" content="512" />
<meta property="og:image:height" content="512" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Sweden &amp; Norway" />
<link rel="stylesheet" href="assets/leaflet/leaflet.css" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="app"></div>
<script src="assets/leaflet/leaflet.js"></script>
<script src="assets/idb-keyval/idb-keyval.js"></script>
<script src="data.js"></script>
<script src="poi_data.js"></script>
<script src="app.js"></script>
</body>
</html>
